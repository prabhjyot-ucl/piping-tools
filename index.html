<!DOCTYPE html>
<html>

<head>
<title>Piping Engineering Tools</title>
<link rel="stylesheet" href="css/style.css">
</head>

<body>

<h1>Piping Engineering Tools</h1>
<p>Free calculators for piping engineers and stress analysts.</p>

<h2>1. Thermal Expansion Calculator</h2>

<label>Pipe Length (m)</label>
<input type="number" id="length">

<label>Temperature Change (°C)</label>
<input type="number" id="temp">

<label>Expansion Coefficient</label>
<input type="number" id="alpha" value="0.000012">

<button onclick="calcExpansion()">Calculate</button>

<h3 id="result"></h3>

<hr>

<h2>2. Hydrotest Stress Calculator</h2>

<label>Pressure (MPa)</label>
<input type="number" id="pressure">

<label>Pipe OD (mm)</label>
<input type="number" id="diameter">

<label>Thickness (mm)</label>
<input type="number" id="thickness">

<button onclick="calcHydro()">Calculate</button>

<h3 id="hydroresult"></h3>

<hr>

<h2>3. Pipe Weight Calculator</h2>

<label>Outer Diameter (mm)</label>
<input type="number" id="od">

<label>Thickness (mm)</label>
<input type="number" id="thk">

<label>Pipe Length (m)</label>
<input type="number" id="plen">

<button onclick="calcPipeWeight()">Calculate</button>

<h3 id="piperesult"></h3>

<hr>

<h2>4. Pipe Support Load Estimator</h2>

<label>Total Pipe Weight (kg)</label>
<input type="number" id="totalweight">

<label>Number of Supports</label>
<input type="number" id="supports">

<button onclick="calcSupportLoad()">Calculate</button>

<h3 id="supportresult"></h3>

<hr>

<h2>5. Pipe Span Calculator</h2>

<label>Distributed Load (N/m)</label>
<input type="number" id="load">

<label>Elastic Modulus E (MPa)</label>
<input type="number" id="E" value="200000">

<label>Moment of Inertia I (mm⁴)</label>
<input type="number" id="I">

<label>Allowable Deflection (mm)</label>
<input type="number" id="deflection">

<button onclick="calcSpan()">Calculate</button>

<h3 id="spanresult"></h3>
  
<script src="js/script.js"></script>

</body>

</html>
